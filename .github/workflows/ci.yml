name: Python CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  run-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install Flask
        run: pip install flask

      - name: Check Python works
        run: python --version
